name: release

# Dispatch-driven release: bumps the version (auto/patch/minor/major), syncs it
# across package.json + tauri.conf.json + Cargo.toml + Cargo.lock, commits +
# tags, then builds macOS (universal), Windows, and Linux installers via
# tauri-action and attaches them (with the signed updater manifest) to a release.
#
# Inspiration: nicebucket-org's build/release workflow, adapted to Bucketeer:
#  - maintained dtolnay/rust-toolchain + Swatinem/rust-cache (not the deprecated
#    actions-rs toolchain / manual cargo cache),
#  - universal macOS target (one .dmg for arm64 + x86_64), per docs/PLAN.md P5.2,
#  - conditional signing via empty-env-skip (no manual keychain dance),
#  - conventional-commit "auto" bump without the deprecated standard-version.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump"
        required: true
        default: "auto"
        type: choice
        options: ["auto", "patch", "minor", "major"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  create-version-tag:
    name: Bump version & tag
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Must run from main
        run: |
          if [ "${GITHUB_REF_NAME:-}" != "main" ]; then
            echo "::error::Releases must be cut from main (got '${GITHUB_REF_NAME}')."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile
      - name: Frontend typecheck (gate)
        run: bun run lint

      - name: Compute, sync, commit & tag
        id: version
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 << 'PYEOF'
          import json, re, subprocess, os
          rt = os.environ["RELEASE_TYPE"]
          pkg = json.load(open("package.json"))
          major, minor, patch = (int(x) for x in pkg["version"].split("."))
          if rt == "auto":
              last = subprocess.run(["git", "describe", "--tags", "--abbrev=0"],
                                    capture_output=True, text=True).stdout.strip()
              rng = f"{last}..HEAD" if last else "HEAD"
              log = subprocess.run(["git", "log", rng, "--pretty=format:%s%n%n%b"],
                                   capture_output=True, text=True).stdout
              if re.search(r"^[a-z]+(\(.+\))?!:", log, re.M) or "BREAKING CHANGE" in log:
                  kind = "major"
              elif re.search(r"^feat(\(.+\))?:", log, re.M):
                  kind = "minor"
              else:
                  kind = "patch"
          else:
              kind = rt
          newv = {"major": f"{major+1}.0.0",
                  "minor": f"{major}.{minor+1}.0",
                  "patch": f"{major}.{minor}.{patch+1}"}[kind]

          pkg["version"] = newv
          with open("package.json", "w") as f:
              json.dump(pkg, f, indent=2)
              f.write("\n")

          tauri = json.load(open("src-tauri/tauri.conf.json"))
          tauri["version"] = newv
          with open("src-tauri/tauri.conf.json", "w") as f:
              json.dump(tauri, f, indent=2)
              f.write("\n")

          # Cargo.toml: only the [package] version (stop at the next section).
          toml_path = "src-tauri/Cargo.toml"
          toml = open(toml_path).read()
          toml = re.sub(
              r"(\[package\][^\[]*?version\s*=\s*)\"[^\"]*\"",
              lambda m: m.group(1) + f'"{newv}"',
              toml, count=1, flags=re.S)
          open(toml_path, "w").write(toml)

          # Cargo.lock: the bucketeer package's version line.
          lock_path = "src-tauri/Cargo.lock"
          lock = open(lock_path).read()
          lock = re.sub(
              r'(name\s*=\s*"bucketeer"\nversion\s*=\s*)"[^"]*"',
              lambda m: m.group(1) + f'"{newv}"', lock)
          open(lock_path, "w").write(lock)

          open("/tmp/version", "w").write(newv)
          PYEOF

          NEW_VERSION=$(cat /tmp/version)
          echo "Bump: $RELEASE_TYPE → $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          git commit -am "chore(release): v${NEW_VERSION}" || {
            echo "::error::Nothing to commit — version may already be ${NEW_VERSION}."
            exit 1
          }
          git tag "v${NEW_VERSION}"
          git push origin HEAD:refs/heads/main
          git push origin "refs/tags/v${NEW_VERSION}"

  publish:
    name: Build & publish (${{ matrix.platform }})
    needs: create-version-tag
    env:
      APP_VERSION: ${{ needs.create-version-tag.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ env.APP_VERSION }}"
          fetch-depth: 0

      - name: Verify version sync
        shell: bash
        run: |
          echo "Expected: ${APP_VERSION}"
          echo "package.json:    $(python3 -c 'import json;print(json.load(open("package.json"))["version"])')"
          echo "tauri.conf.json: $(python3 -c 'import json;print(json.load(open("src-tauri/tauri.conf.json"))["version"])')"
          echo "Cargo.toml:      $(python3 -c 'import re;print(re.search(r\"version = \\\"(.+?)\\\"\", open(\"src-tauri/Cargo.toml\").read()).group(1))')"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Bun on Windows occasionally leaves a stale lock; a clean reinstall is cheapest.
      - name: Clean install (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "node_modules") { Remove-Item -Recurse -Force "node_modules" }
          bun install --frozen-lockfile

      - name: Install frontend dependencies (Unix)
        if: matrix.platform != 'windows-latest'
        run: bun install --frozen-lockfile

      # Only the updater key is required — it signs the update bundle on every
      # platform. Apple code-sign / notarize env vars are intentionally OMITTED:
      # tauri-bundler treats an EMPTY `APPLE_CERTIFICATE` as a cert to import
      # (not a skip), so it runs `security import` on nothing and fails the
      # macOS bundle. With no APPLE_* env set, macOS ad-hoc signs via the
      # `signingIdentity: "-"` in tauri.conf.json. Re-add these env lines when a
      # real Developer ID certificate is configured:
      #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD  (codesign import)
      #   APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID (notarize)
      - uses: tauri-apps/tauri-action@v0
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ env.APP_VERSION }}
          releaseName: "Bucketeer v${{ env.APP_VERSION }}"
          releaseBody: |
            ## Bucketeer v${{ env.APP_VERSION }}

            Download the asset for your platform below. Once you've installed a
            build, Bucketeer will auto-update to future releases.

            - **macOS**: `*.dmg` (universal — Apple Silicon + Intel)
            - **Windows**: `*.exe` (NSIS installer)
            - **Linux**: `*.AppImage` / `*.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
